<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tankzers 3D</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="scene"></div>

  <div id="hud">
    <div class="hud-box" id="hud-turn">Connecting…</div>
    <div class="hud-box" id="hud-wind"><span>Wind</span> <span id="wind-arrow">•</span> <span id="wind-mag">0</span></div>
    <div class="hud-box" id="hud-room"></div>
  </div>

  <div id="teams"></div>

  <div id="log"></div>

  <div id="controls">
    <div class="ctrl">
      <label>Angle <span id="angle-val">45</span>°</label>
      <input type="range" id="angle" min="0" max="180" value="45" />
    </div>
    <div class="ctrl">
      <label>Power <span id="power-val">60</span></label>
      <input type="range" id="power" min="5" max="100" value="60" />
    </div>
    <div class="ctrl" id="weapons"></div>
    <button id="fire-btn" disabled>FIRE</button>
  </div>

  <div id="overlay">
    <div class="panel">
      <h1>Tankzers <span class="dim">3D</span></h1>
      <div class="modes">
        <button class="mode-btn selected" data-mode="1v1">1v1</button>
        <button class="mode-btn" data-mode="2v2">2v2</button>
      </div>
      <button id="create-btn">Create Room</button>
      <div class="join">
        <input type="text" id="join-code" maxlength="4" placeholder="CODE" />
        <button id="join-btn">Join</button>
      </div>
      <p id="overlay-msg"></p>
    </div>
  </div>

  <div id="hint">Scroll to zoom</div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="client.js"></script>
</body>
</html>
